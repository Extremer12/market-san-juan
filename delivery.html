<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo de Reparto — Market San Juan</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: var(--bg-dark); color: var(--text-on-dark); }
    .nav-dark { background: var(--bg-dark-subtle); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .driver-card {
      background: var(--bg-dark-card); border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg); padding: 24px;
      transition: all var(--duration) var(--ease);
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div class="container" style="padding-top:100px;padding-bottom:60px;max-width:1100px;">
    
    <!-- Driver Dashboard Header -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:20px;">
      <div style="display:flex;align-items:center;gap:20px;">
        <div style="width:72px;height:72px;background:var(--primary-gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:800;font-family:var(--font-heading);box-shadow:var(--shadow-glow-primary);">MA</div>
        <div>
          <h1 style="font-size:1.6rem;margin-bottom:4px;color:#fff;">Martín A.</h1>
          <p style="color:rgba(255,255,255,0.6);font-size:0.95rem;display:flex;align-items:center;gap:6px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;;"><path d="m12 14 4-4"/><path d="M3.34 17a10 10 0 1 1 17.32 0"/></svg> Auto particular &middot; Verificado
          </p>
        </div>
      </div>
      <div style="display:flex;gap:24px;background:var(--bg-dark-card);padding:16px 32px;border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,0.08);">
        <div style="text-align:center;">
          <div style="color:rgba(255,255,255,0.5);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Ganancias Hoy</div>
          <div style="font-size:1.6rem;font-weight:800;color:var(--success);font-family:var(--font-heading);">$ 14.500</div>
        </div>
        <div style="width:1px;background:rgba(255,255,255,0.1);"></div>
        <div style="text-align:center;">
          <div style="color:rgba(255,255,255,0.5);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Viajes</div>
          <div style="font-size:1.6rem;font-weight:800;color:#fff;font-family:var(--font-heading);">4</div>
        </div>
      </div>
    </div>

    <!-- Layout Matrix -->
    <div style="display:grid;grid-template-columns:1fr 400px;gap:32px;">
      
      <!-- Right Side: Available Deliveries -->
      <div style="order:1;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <h2 style="font-size:1.3rem;color:#fff;">Envíos Disponibles</h2>
          <span style="background:rgba(37,99,235,0.15);color:var(--primary-light);padding:4px 12px;border-radius:var(--radius-full);font-size:0.8rem;font-weight:600;"><svg style="width:10px;height:10px;display:inline;margin-right:4px;" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg> En vivo</span>
        </div>

        <div style="display:flex;flex-direction:column;gap:16px;" id="deliveryQueue">
          <!-- Dynamically populated via app.js -->
        </div>
      </div>

      <!-- Left Side: Map UI Simulation -->
      <div style="order:0;">
        <h2 style="font-size:1.3rem;margin-bottom:20px;color:#fff;">Zonas de Demanda</h2>
        <div style="width:100%;height:550px;background:#0f172a;border-radius:var(--radius-xl);position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 100px rgba(0,0,0,0.5);">
          <!-- Map Background pattern -->
          <div style="position:absolute;inset:0;opacity:0.6;background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);background-size:30px 30px;"></div>
          
          <!-- Heatmap spots -->
          <div style="position:absolute;top:30%;left:40%;width:250px;height:250px;background:radial-gradient(circle, rgba(220,38,38,0.2) 0%, transparent 70%);border-radius:50%;"></div>
          <div style="position:absolute;bottom:20%;right:20%;width:300px;height:300px;background:radial-gradient(circle, rgba(217,119,6,0.15) 0%, transparent 70%);border-radius:50%;"></div>

          <!-- Driver Marker -->
          <div style="position:relative;z-index:10;text-align:center;">
            <div style="width:48px;height:48px;background:var(--primary);border:4px solid var(--bg-dark-card);border-radius:50%;box-shadow:0 0 30px rgba(37,99,235,0.5);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:#fff;animation:pulse 2s infinite;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            </div>
            <div id="driver-location-tag" style="background:rgba(0,0,0,0.8);padding:6px 16px;border-radius:var(--radius-full);font-size:0.8rem;font-weight:600;color:#fff;border:1px solid rgba(255,255,255,0.1);">
              Tu ubicación actual
            </div>
          </div>
          
          <div style="position:absolute;top:24px;left:24px;background:rgba(15,23,42,0.8);padding:16px;border-radius:var(--radius-lg);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:0.85rem;color:#fff;">
              <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:rgba(220,38,38,0.8);box-shadow:0 0 10px rgba(220,38,38,0.5);"></span> Alta Demanda (Capital)
            </div>
            <div style="display:flex;align-items:center;gap:12px;font-size:0.85rem;color:#fff;">
              <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:rgba(217,119,6,0.8);box-shadow:0 0 10px rgba(217,119,6,0.5);"></span> Media Demanda (Rawson)
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
