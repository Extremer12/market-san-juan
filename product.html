<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Producto — Market San Juan</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body style="background:var(--bg-alt);">

  <div id="navbar-placeholder"></div>

  <div class="container" style="padding-top:120px;padding-bottom:100px;">
    <a href="marketplace.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);font-weight:500;margin-bottom:32px;transition:color var(--duration) var(--ease);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="m15 18-6-6 6-6"/></svg> Volver a resultados
