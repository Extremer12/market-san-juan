<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes — Market San Juan</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body style="background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;">

  <div id="navbar-placeholder"></div>

  <div class="container" style="flex:1;display:flex;padding-top:24px;padding-bottom:24px;gap:24px;height:calc(100vh - var(--nav-height));max-width:1200px;">
    
    <!-- Contacts Sidebar -->
    <div class="card" style="width:360px;display:flex;flex-direction:column;border-right:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:0;">
      <div style="padding:24px;border-bottom:1px solid var(--border-subtle);">
        <h2 style="font-size:1.4rem;margin-bottom:20px;letter-spacing:-0.02em;">Tus Mensajes</h2>
        <div class="search-bar" style="border-radius:var(--radius-full);padding:0 16px;">
          <input type="text" placeholder="Buscar charla..." style="padding:12px;font-size:0.9rem;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:var(--text-muted);"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
      </div>
      
      <!-- Lista Dinamica Chat -->
      <div style="flex:1;overflow-y:auto;" id="chatContactsList">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Chat Area -->
    <div class="card" style="flex:1;display:flex;flex-direction:column;box-shadow:var(--shadow-sm);padding:0;">
      <!-- Header Dinamico -->
      <div style="padding:20px 28px;border-bottom:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:center;background:var(--bg-card);">
        <div style="display:flex;gap:16px;align-items:center;">
          <div id="chatHeaderAvatar" style="width:44px;height:44px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;"></div>
          <div>
            <h3 id="chatHeaderName" style="font-size:1.2rem;margin-bottom:2px;display:flex;align-items:center;gap:8px;"></h3>
            <span id="chatHeaderStatus" style="font-size:0.85rem;color:var(--success);font-weight:500;display:flex;align-items:center;gap:4px;">
            </span>
          </div>
        </div>
        <div>
          <button class="btn btn-outline btn-sm" onclick="showToast('Usuario reportado a moderación','info')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Reportar
          </button>
        </div>
      </div>

      <!-- Context Product Card Dinamico -->
      <div style="padding:16px 28px;background:var(--bg-alt);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:20px;">
        <div id="chatProductImage" style="width:64px;height:64px;border-radius:var(--radius-sm);display:flex;justify-content:center;align-items:center;color:#fff;">
        </div>
        <div style="flex:1;">
          <div style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:2px;">Negociando por</div>
          <div id="chatProductContext"></div>
        </div>
      </div>

      <!-- Messages List Dinamico -->
      <div id="chatMessagesArea" style="flex:1;padding:28px;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;gap:24px;">
        <!-- Rendered by JS -->
      </div>

      <!-- Input Area -->
      <div style="padding:20px 28px;border-top:1px solid var(--border-subtle);background:var(--bg-card);">
        <form onsubmit="handleSendMessage(event)">
          <div style="display:flex;gap:12px;align-items:center;">
            <button type="button" class="btn btn-outline" style="padding:0;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input type="text" id="msgInput" class="form-input" placeholder="Escribí tu mensaje acá..." style="margin-bottom:0;border-radius:var(--radius-full);padding:16px 24px;" autocomplete="off">
            <button type="submit" class="btn btn-primary" style="padding:16px 32px;border-radius:var(--radius-full);display:flex;align-items:center;gap:8px;">
              <span>Enviar</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
