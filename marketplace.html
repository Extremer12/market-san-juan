<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explorá productos a la venta en San Juan. Tecnología, vehículos, ropa, artesanías y más.">
  <title>Explorar Productos — Market San Juan</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <div class="page-header__orb"></div>
    <div class="container">
      <h1>Explorar Productos</h1>
      <p>Encontrá lo que buscás entre vendedores verificados de toda la provincia</p>
    </div>
  </div>

  <section class="section" style="padding-top:40px;">
    <div class="container">
      <div class="search-bar" style="margin-bottom:16px;">
        <input type="text" id="searchInput" placeholder="Buscar productos, tiendas o servicios..." onkeyup="searchProducts()">
        <button onclick="searchProducts()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          Buscar
        </button>
      </div>

      <div class="filter-bar">
        <button class="filter-chip active" onclick="filterProducts('all')">Todos</button>
        <button class="filter-chip" onclick="filterProducts('tech')">Tecnología</button>
        <button class="filter-chip" onclick="filterProducts('vehicles')">Vehículos</button>
        <button class="filter-chip" onclick="filterProducts('home')">Hogar</button>
        <button class="filter-chip" onclick="filterProducts('clothing')">Ropa</button>
        <button class="filter-chip" onclick="filterProducts('sports')">Deportes</button>
        <button class="filter-chip" onclick="filterProducts('food')">Alimentos</button>
        <button class="filter-chip" onclick="filterProducts('services')">Servicios</button>
        <button class="filter-chip" onclick="filterProducts('crafts')">Artesanías</button>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin:20px 0;">
        <p style="color:var(--text-secondary);font-size:0.88rem;"><strong id="resultCount">12</strong> productos encontrados</p>
        <select class="form-input form-select" style="width:auto;padding:8px 40px 8px 14px;font-size:0.82rem;">
          <option>Más recientes</option>
          <option>Menor precio</option>
          <option>Mayor precio</option>
          <option>Mejor puntuación</option>
        </select>
      </div>

      <div class="marketplace-grid" id="productsGrid"></div>
    </div>
  </section>

  <footer class="footer" style="padding:32px 0;">
    <div class="container">
      <div class="footer__bottom" style="border:none;padding:0;">
        <span>&copy; 2026 Market San Juan — Gobierno de la Provincia de San Juan</span>
        <span>Desarrollado en San Juan, Argentina</span>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
